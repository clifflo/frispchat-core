<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrispChat</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-main: #0f0f1a;
      --bg-sidebar: #16161e;
      --bg-panel: #1e1e2e;
      --bg-input: #252535;
      --accent: #e94560;
      --accent-light: #f06475;
      --text-primary: #e0e0e0;
      --text-secondary: #8888aa;
      --border: rgba(255,255,255,0.08);
      --msg-own: rgba(233,69,96,0.18);
      --msg-other: rgba(255,255,255,0.05);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
    }
    .sidebar-header p { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }
    .rooms-label {
      padding: 0.8rem 1rem 0.3rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
    .room-list { flex: 1; overflow-y: auto; padding: 0.3rem 0.5rem; }
    .room-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text-secondary);
      font-size: 0.92rem;
    }
    .room-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .room-item.active { background: rgba(233,69,96,0.18); color: var(--accent-light); }
    .room-item .hash { opacity: 0.6; font-size: 1rem; }
    .user-panel {
      padding: 0.9rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-name { font-size: 0.88rem; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 1.1rem; padding: 4px;
      border-radius: 4px; transition: color 0.15s;
    }
    .logout-btn:hover { color: var(--accent); }

    /* ── Main chat area ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-header .hash { color: var(--accent); font-size: 1.1rem; }
    .chat-header h2 { font-size: 1rem; font-weight: 600; }
    .chat-header .status {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--text-secondary);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc;
    }
    .status-dot.connected { background: #27ae60; }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .msg-group { display: flex; flex-direction: column; gap: 2px; }
    .msg-item {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      background: var(--msg-other);
      align-self: flex-start;
    }
    .msg-item.own {
      background: var(--msg-own);
      align-self: flex-end;
    }
    .msg-meta {
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-bottom: 2px;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .msg-meta .msg-user { font-weight: 600; color: var(--accent-light); }
    .msg-item.own .msg-meta { flex-direction: row-reverse; }
    .msg-item.own .msg-meta .msg-user { color: #ffb3be; }
    .msg-content { font-size: 0.92rem; word-break: break-word; line-height: 1.45; }
    .day-divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin: 0.8rem 0;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .day-divider::before, .day-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.6rem; color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 3rem; }
    .empty-state p { font-size: 0.9rem; }

    .input-area {
      padding: 0.8rem 1.2rem 1rem;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 0.94rem;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }
    #msg-input::placeholder { color: var(--text-secondary); }
    #send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      margin: 4px;
      border-radius: 8px;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .typing-indicator {
      font-size: 0.75rem;
      color: var(--text-secondary);
      height: 18px;
      padding: 0 0.2rem;
      margin-top: 4px;
    }

    /* ── No-room placeholder ── */
    .no-room {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem; color: var(--text-secondary);
    }
    .no-room .icon { font-size: 4rem; }
    .no-room h2 { font-size: 1.3rem; color: var(--text-primary); }
    .no-room p { font-size: 0.9rem; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 600px) {
      .sidebar { width: 200px; min-width: 200px; }
      .msg-item { max-width: 85%; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>💬 FrispChat</h1>
      <p>Real-time messaging</p>
    </div>
    <div class="rooms-label">Channels</div>
    <div class="room-list" id="room-list">
      <div style="padding:0.5rem 0.7rem; color: var(--text-secondary); font-size:0.85rem;">Loading…</div>
    </div>
    <div class="user-panel">
      <div class="avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name-label">—</span>
      <button class="logout-btn" title="Log out" onclick="logout()">⏏</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="chat-main">
    <!-- Header -->
    <div class="chat-header" id="chat-header">
      <span class="hash">#</span>
      <h2 id="room-title">Select a channel</h2>
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </div>

    <!-- No-room placeholder -->
    <div class="no-room" id="no-room-panel">
      <div class="icon">💬</div>
      <h2>Welcome to FrispChat</h2>
      <p>Select a channel from the sidebar to start chatting.</p>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messages-area" style="display:none"></div>

    <!-- Input -->
    <div class="input-area" id="input-area" style="display:none">
      <div class="input-box">
        <textarea id="msg-input" rows="1" placeholder="Message #general…"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
      </div>
      <div class="typing-indicator" id="typing-indicator"></div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('fc_token');
    const user  = JSON.parse(localStorage.getItem('fc_user') || 'null');

    if (!token || !user) {
      window.location.href = '/';
    }

    // Fill user info
    document.getElementById('user-name-label').textContent = user.username;
    document.getElementById('user-avatar').textContent = user.username.charAt(0).toUpperCase();

    let socket = null;
    let currentRoomId = null;
    let rooms = [];

    // ── Socket.io ──
    function connectSocket() {
      socket = io({ auth: { token } });

      socket.on('connect', () => {
        setStatus(true);
        if (currentRoomId) socket.emit('join_room', currentRoomId);
      });

      socket.on('disconnect', () => setStatus(false));

      socket.on('joined_room', ({ roomId, roomName }) => {
        currentRoomId = roomId;
        document.getElementById('room-title').textContent = roomName;
        document.getElementById('msg-input').placeholder = `Message #${roomName}…`;
        loadMessages(roomId);
        showChatUI(true);
      });

      socket.on('new_message', (msg) => {
        appendMessage(msg);
        scrollBottom();
      });

      socket.on('error', (err) => {
        console.error('Socket error:', err.message);
      });
    }

    function setStatus(connected) {
      document.getElementById('status-dot').className = 'status-dot' + (connected ? ' connected' : '');
      document.getElementById('status-text').textContent = connected ? 'Connected' : 'Disconnected';
    }

    // ── Rooms ──
    async function loadRooms() {
      try {
        const res = await fetch('/api/rooms', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401 || res.status === 403) { logout(); return; }
        const data = await res.json();
        rooms = data.rooms || [];
        renderRooms();
        if (rooms.length > 0) joinRoom(rooms[0].id);
      } catch (e) {
        console.error('Failed to load rooms', e);
      }
    }

    function renderRooms() {
      const list = document.getElementById('room-list');
      list.innerHTML = '';
      rooms.forEach(r => {
        const el = document.createElement('div');
        el.className = 'room-item' + (r.id === currentRoomId ? ' active' : '');
        el.dataset.roomId = r.id;
        el.innerHTML = `<span class="hash">#</span> ${escapeHtml(r.name)}`;
        el.onclick = () => joinRoom(r.id);
        list.appendChild(el);
      });
    }

    function joinRoom(roomId) {
      if (roomId === currentRoomId) return;
      // Update active state optimistically
      document.querySelectorAll('.room-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.roomId) === roomId);
      });
      if (socket && socket.connected) {
        if (currentRoomId) socket.emit('leave_room', currentRoomId);
        socket.emit('join_room', roomId);
      } else {
        currentRoomId = roomId;
      }
    }

    // ── Messages ──
    async function loadMessages(roomId) {
      const area = document.getElementById('messages-area');
      area.innerHTML = '';
      try {
        const res = await fetch(`/api/rooms/${roomId}/messages?limit=50`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) return;
        const data = await res.json();
        if (!data.messages || data.messages.length === 0) {
          area.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>No messages yet. Say hello!</p></div>`;
          return;
        }
        data.messages.forEach(m => appendMessage(m));
        scrollBottom();
      } catch (e) { console.error(e); }
    }

    function appendMessage(msg) {
      const area = document.getElementById('messages-area');
      // Remove empty state if present
      const empty = area.querySelector('.empty-state');
      if (empty) empty.remove();

      const isOwn = msg.username === user.username;
      const time = formatTime(msg.created_at);
      const el = document.createElement('div');
      el.className = 'msg-item' + (isOwn ? ' own' : '');
      el.innerHTML = `
        <div class="msg-meta">
          <span class="msg-user">${escapeHtml(msg.username)}</span>
          <span>${time}</span>
        </div>
        <div class="msg-content">${escapeHtml(msg.content)}</div>`;
      area.appendChild(el);
    }

    function scrollBottom() {
      const area = document.getElementById('messages-area');
      area.scrollTop = area.scrollHeight;
    }

    function showChatUI(show) {
      document.getElementById('no-room-panel').style.display = show ? 'none' : 'flex';
      document.getElementById('messages-area').style.display = show ? 'flex' : 'none';
      document.getElementById('input-area').style.display = show ? 'block' : 'none';
    }

    // ── Send message ──
    function sendMessage() {
      const input = document.getElementById('msg-input');
      const content = input.value.trim();
      if (!content || !currentRoomId) return;
      socket.emit('send_message', { roomId: currentRoomId, content });
      input.value = '';
      input.style.height = 'auto';
    }

    // Enter to send (Shift+Enter for new line)
    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    document.getElementById('msg-input').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // ── Auth ──
    function logout() {
      fetch('/api/auth/logout', { method: 'POST' });
      localStorage.removeItem('fc_token');
      localStorage.removeItem('fc_user');
      window.location.href = '/';
    }

    // ── Helpers ──
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ── Init ──
    connectSocket();
    loadRooms();
  </script>
</body>
</html>
